# A non-expiring token for the home-assistant-argocd ServiceAccount, for use
# when Home Assistant runs OUTSIDE the cluster (the Manual K8s backend).
#
# Apply a serviceaccount-*.yaml first, then this, then read the token + CA:
#   kubectl apply -f serviceaccount-token-secret.yaml
#   kubectl -n argocd get secret home-assistant-argocd-token -o jsonpath='{.data.token}'  | base64 -d
#   kubectl -n argocd get secret home-assistant-argocd-token -o jsonpath='{.data.ca\.crt}' | base64 -d
---
apiVersion: v1
kind: Secret
metadata:
  name: home-assistant-argocd-token
  namespace: argocd
  annotations:
    kubernetes.io/service-account.name: home-assistant-argocd
type: kubernetes.io/service-account-token
