# Read-write access for the Home Assistant ArgoCD integration (Kubernetes backend).
# Adds "patch" on Application CRDs so the integration can trigger syncs
# (writes .operation) and refreshes (sets the argocd.argoproj.io/refresh
# annotation) in addition to reading status.
#
#   kubectl apply -f serviceaccount-readwrite.yaml
#
# Then mint a token for the ServiceAccount (see manifests/README.md).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: home-assistant-argocd
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: home-assistant-argocd-readwrite
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: home-assistant-argocd-readwrite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: home-assistant-argocd-readwrite
subjects:
  - kind: ServiceAccount
    name: home-assistant-argocd
    namespace: argocd
