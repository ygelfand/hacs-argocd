# Read-only access for the Home Assistant ArgoCD integration (Kubernetes backend).
# Grants list/get/watch on ArgoCD Application CRDs cluster-wide.
#
#   kubectl apply -f serviceaccount-readonly.yaml
#
# Then mint a token for the ServiceAccount (see manifests/README.md).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: home-assistant-argocd
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: home-assistant-argocd-readonly
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: home-assistant-argocd-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: home-assistant-argocd-readonly
subjects:
  - kind: ServiceAccount
    name: home-assistant-argocd
    namespace: argocd
